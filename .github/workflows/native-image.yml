name: Native Image Tests

# workflow_dispatch only becomes available once this file is on the default
# branch, so the workflow also triggers on pushes to the GraalVM evaluation
# branch. Native tests are expected to fail until the Jackson-dependent
# libraries (aws-lambda-java-events, auth0) are replaced. Once merged to main
# and the blockers are resolved, replace the branch trigger with a general
# push/pull_request trigger.
on:
  workflow_dispatch:
  push:
    branches:
      - 'claude/graalvm-evaluation-*'
      - '*graalvm*'

permissions:
  contents: read

jobs:
  native-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run router tests as a native image
        run: ./gradlew :router:nativeTest
