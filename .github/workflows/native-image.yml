name: Native Image Tests

# Manual trigger only for now: native tests are expected to fail until the
# Jackson-dependent libraries (aws-lambda-java-events, auth0) are replaced.
# Once those blockers are resolved, add a push/pull_request trigger.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Change wrapper permissions
        run: chmod +x ./gradlew

      - name: Run router tests as a native image
        run: ./gradlew :router:nativeTest
